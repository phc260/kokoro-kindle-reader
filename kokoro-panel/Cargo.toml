[package]
name = "kokoro-panel"
version = "0.1.0"
edition = "2021"
description = "Native settings panel for Kokoro Kindle Reader (egui)"

# Separate from the headless host so eframe/egui/winit don't bloat the always-on
# tray host. The tray spawns this on demand; it reads/writes the same controls.json
# the host reads per utterance, so changes land on Kindle's next page. Preview
# synthesizes via the host's pipe (same engine as Kindle).

[[bin]]
name = "kokoro-panel"
path = "src/main.rs"

[dependencies]
eframe = "0.29"
serde_json = "1"
# Preview playback. The panel synthesizes a per-voice intro through the host's pipe
# (same engine + controls.json as Kindle) and plays the returned PCM with rodio.
rodio = { version = "0.19", default-features = false }
# Model download/verify (blocking client on a bg thread; rustls avoids a system
# OpenSSL dep). Files stream from HuggingFace per model-manifest.json; each is
# SHA-256-verified before commit.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "blocking"] }
sha2 = "0.10"
