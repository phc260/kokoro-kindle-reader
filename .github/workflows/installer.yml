name: Installer (kokoro-host + panel)

# Builds the installer: the tray host (kokoro-host) + the Slint settings panel
# (kokoro-panel) + the native Dawn WebGPU runtime + the x86 KokoroSapi.dll (Rust),
# packaged by packaging/build-installer.ps1 (makensis). This is the only edition now
# (the old Tauri/WebView2 build is retired), so it owns the vX.Y.Z release tags.
# Windows-only. The synth runtime deps are provisioned by fetch-deps.ps1 (the
# onnxruntime-webgpu wheel for the Dawn runtime DLLs + an espeak-ng x64 build). The
# synth core is pure Rust; onnxruntime.dll is loaded at runtime via the `ort` crate.

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true # icons/icon.ico is in Git LFS (bundled + shortcut icon)

      - name: Set up Python (for the onnxruntime-webgpu wheel)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc # the x86 SAPI DLL (kokoro-sapi)

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            kokoro-host
            kokoro-panel
            kokoro-sapi
            kokoro-hook
            kokoro-inject

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      # Provision native-deps/third_party: the Dawn runtime DLLs (from the
      # onnxruntime-webgpu wheel) + an espeak-ng x64 build. Downloads + a build;
      # the slowest step.
      - name: Provision native deps (ORT runtime + espeak)
        shell: pwsh
        run: ./native-deps/tools/fetch-deps.ps1

      # Build the x86 Rust SAPI DLL + release-build both crates, stage, run makensis.
      - name: Build installer
        shell: pwsh
        run: ./packaging/build-installer.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: kokoro-kindle-reader-setup
          path: packaging/*-setup.exe
          if-no-files-found: error

      # Release title: match the existing "kokoro-kindle-reader vX.Y.Z" convention
      # (strip the leading v from the tag).
      - name: Compose release title
        if: startsWith(github.ref, 'refs/tags/v')
        id: relname
        shell: bash
        run: echo "title=kokoro-kindle-reader v${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # On a v* tag, also publish a draft GitHub Release.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: packaging/*-setup.exe
          draft: true
          name: ${{ steps.relname.outputs.title }}
          body: |
            WebView2-free edition of Kokoro Kindle Reader — a headless tray host
            (native Dawn WebGPU synthesis) + a native Slint settings panel.
            Bundles the "Kokoro (SAPI5)" x86 engine so Kindle for PC can narrate.

            The Kokoro model downloads on first run (open Settings from the tray).
            The app must stay running (tray) for Kindle to speak.
