name: installer (kokoro-reader)

# Builds the Windows installer with the x86 SAPI engine (KokoroSapi.dll) bundled
# in. The DLL is compiled FIRST, in the same job, because tauri.conf.json's
# `bundle.resources` pulls it from kokoro-sapi/build/ at bundle time — it must
# exist on disk before `tauri build` runs.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Must run before `tauri build` — produces kokoro-sapi/build/KokoroSapi.dll,
      # which the bundler copies into the installer's resources/ dir.
      - name: Build SAPI engine (x86)
        shell: pwsh
        run: ./kokoro-sapi/build.ps1

      - uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Puts the latest Windows SDK rc.exe on PATH for the x64 app build. Without
      # it tauri-winres picks up a stale RC.EXE that can't compile our PNG-encoded
      # icon.ico (RC2175 "not in 3.00 format"). build.ps1 above sets its own x86
      # env in a cmd subshell, so this amd64 env doesn't disturb the DLL build.
      - name: Set up MSVC dev environment (modern rc.exe)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # Runs beforeBuildCommand (bun run build -> tsc + vite) then bundles the
      # NSIS/MSI installers, embedding controls.ini + KokoroSapi.dll.
      - name: Build installer
        run: bun run tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: kokoro-reader-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
